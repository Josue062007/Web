<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhoneCam — Acceso Remoto a Cámaras</title>
  <meta name="description" content="Accede a las cámaras de tu celular desde cualquier lugar del mundo">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow cyan"></div>
  <div class="bg-glow purple"></div>

  <div class="app-container">
    <div class="logo">
      <div class="logo-icon">📷</div>
      <span class="logo-text">PhoneCam</span>
    </div>
    <p class="subtitle">Accede a las cámaras de tu celular desde cualquier lugar</p>

    <div class="glass-card">
      <div class="role-cards">
        <a href="phone.html" class="role-card" id="role-phone">
          <div class="role-icon">📱</div>
          <div class="role-info">
            <h3>Soy el Celular</h3>
            <p>Comparte la cámara de este dispositivo</p>
          </div>
          <span class="role-arrow">→</span>
        </a>

        <a href="dashboard.html" class="role-card" id="role-dashboard">
          <div class="role-icon">💻</div>
          <div class="role-info">
            <h3>Soy la PC</h3>
            <p>Ver las cámaras conectadas en vivo</p>
          </div>
          <span class="role-arrow">→</span>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
