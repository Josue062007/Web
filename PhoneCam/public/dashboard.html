<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhoneCam — Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow cyan"></div>
  <div class="bg-glow purple"></div>

  <div class="dashboard-container">
    <!-- Header -->
    <div class="dashboard-header">
      <div class="logo">
        <a href="index.html" style="text-decoration:none; display:flex; align-items:center; gap:12px;">
          <div class="logo-icon">📷</div>
          <span class="logo-text">PhoneCam</span>
        </a>
      </div>

      <div class="connect-form" id="connect-form">
        <input
          type="text"
          class="connect-input"
          id="room-input"
          maxlength="6"
          placeholder="CÓDIGO"
          inputmode="numeric"
          pattern="[0-9]*"
          autocomplete="off"
        >
        <button class="btn btn-primary" id="btn-connect">
          🔗 Conectar
        </button>
        <button class="btn btn-danger" id="btn-disconnect" style="display: none;">
          ⏹ Desconectar
        </button>
      </div>
    </div>

    <!-- Video Area -->
    <div class="video-area">
      <!-- Empty state -->
      <div id="empty-state" class="empty-state">
        <div class="empty-icon">📡</div>
        <h2>Esperando conexión</h2>
        <p>Ingresa el código de 6 dígitos que aparece en el celular para ver la cámara en vivo.</p>
      </div>

      <!-- Video player -->
      <div id="video-container" style="display: none; width: 100%; max-width: 900px;">
        <div class="status-bar" id="connection-status">
          <div class="status-dot waiting" id="status-dot"></div>
          <span class="status-text" id="status-text">Conectando...</span>
          <span style="margin-left: auto; font-size: 12px; color: var(--text-muted);" id="room-display"></span>
        </div>

        <div class="video-wrapper" id="video-wrapper">
          <video id="remote-video" autoplay playsinline></video>
          <div class="video-overlay">
            <div class="video-badge">
              <span class="dot"></span>
              <span id="camera-info">En vivo</span>
            </div>
            <div class="video-controls">
              <button class="btn btn-secondary btn-icon" id="btn-screenshot" title="Captura de pantalla">
                📸
              </button>
              <button class="btn btn-secondary btn-icon" id="btn-fullscreen" title="Pantalla completa">
                ⛶
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ─── State ───
    let socket;
    let peerConnection;
    let remoteStream;
    let connectedRoom = '';

    // ─── ICE Servers ───
    const iceServers = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' },
        { urls: 'stun:stun3.l.google.com:19302' },
        { urls: 'stun:stun4.l.google.com:19302' },
        {
          urls: 'turn:openrelay.metered.ca:80',
          username: 'openrelayproject',
          credential: 'openrelayproject'
        },
        {
          urls: 'turn:openrelay.metered.ca:443',
          username: 'openrelayproject',
          credential: 'openrelayproject'
        },
        {
          urls: 'turn:openrelay.metered.ca:443?transport=tcp',
          username: 'openrelayproject',
          credential: 'openrelayproject'
        }
      ]
    };

    // ─── UI Helpers ───
    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function updateStatus(type, text) {
      const dot = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');
      dot.className = `status-dot ${type}`;
      statusText.textContent = text;
    }

    function showVideo(show) {
      document.getElementById('empty-state').style.display = show ? 'none' : 'block';
      document.getElementById('video-container').style.display = show ? 'block' : 'none';
    }

    // ─── WebRTC ───
    function createPeerConnection() {
      if (peerConnection) {
        peerConnection.close();
      }

      peerConnection = new RTCPeerConnection(iceServers);

      peerConnection.ontrack = (event) => {
        console.log('Track received:', event.track.kind);
        const video = document.getElementById('remote-video');
        if (event.streams && event.streams[0]) {
          video.srcObject = event.streams[0];
          remoteStream = event.streams[0];
        }
      };

      peerConnection.onicecandidate = (event) => {
        if (event.candidate) {
          socket.emit('ice-candidate', { candidate: event.candidate });
        }
      };

      peerConnection.oniceconnectionstatechange = () => {
        const state = peerConnection.iceConnectionState;
        console.log('ICE state:', state);

        switch (state) {
          case 'connected':
          case 'completed':
            updateStatus('connected', 'Conectado — Transmisión en vivo');
            break;
          case 'checking':
            updateStatus('waiting', 'Estableciendo conexión...');
            break;
          case 'disconnected':
            updateStatus('waiting', 'Reconectando...');
            break;
          case 'failed':
            updateStatus('disconnected', 'Conexión fallida');
            showToast('⚠️ Conexión perdida con el celular');
            break;
          case 'closed':
            updateStatus('disconnected', 'Desconectado');
            break;
        }
      };

      return peerConnection;
    }

    // ─── Socket.IO ───
    function connectToRoom(code) {
      socket = io();

      socket.on('connect', () => {
        console.log('Conectado al servidor');
        socket.emit('join-room', code, (response) => {
          if (response.success) {
            connectedRoom = code;
            document.getElementById('room-display').textContent = `Sala: ${code}`;
            showVideo(true);
            updateStatus('waiting', 'Conectado a la sala — esperando video...');
            showToast('✅ Conectado a la sala');

            // Toggle buttons
            document.getElementById('btn-connect').style.display = 'none';
            document.getElementById('btn-disconnect').style.display = 'inline-flex';
            document.getElementById('room-input').disabled = true;
          } else {
            showToast(`❌ ${response.error}`);
            socket.disconnect();
          }
        });
      });

      socket.on('offer', async (data) => {
        try {
          createPeerConnection();
          await peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));
          const answer = await peerConnection.createAnswer();
          await peerConnection.setLocalDescription(answer);
          socket.emit('answer', { sdp: peerConnection.localDescription });
          updateStatus('waiting', 'Negociando conexión...');
        } catch (err) {
          console.error('Error handling offer:', err);
        }
      });

      socket.on('ice-candidate', async (data) => {
        try {
          if (peerConnection && data.candidate) {
            await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
          }
        } catch (err) {
          console.error('Error adding ICE candidate:', err);
        }
      });

      socket.on('camera-switched', (data) => {
        document.getElementById('camera-info').textContent = `Cámara ${data.camera}`;
        showToast(`📸 Cambió a cámara ${data.camera}`);
      });

      socket.on('phone-disconnected', () => {
        updateStatus('disconnected', 'El celular se desconectó');
        showToast('📱 El celular se desconectó');
      });

      socket.on('disconnect', () => {
        updateStatus('disconnected', 'Desconectado del servidor');
      });
    }

    function disconnect() {
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }
      if (socket) {
        socket.disconnect();
      }
      showVideo(false);
      document.getElementById('btn-connect').style.display = 'inline-flex';
      document.getElementById('btn-disconnect').style.display = 'none';
      document.getElementById('room-input').disabled = false;
      document.getElementById('room-input').value = '';
      connectedRoom = '';
      showToast('⏹ Desconectado');
    }

    // ─── Event Listeners ───
    document.getElementById('btn-connect').addEventListener('click', () => {
      const code = document.getElementById('room-input').value.trim();
      if (code.length !== 6) {
        showToast('⚠️ Ingresa un código de 6 dígitos');
        return;
      }
      connectToRoom(code);
    });

    document.getElementById('room-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('btn-connect').click();
      }
    });

    // Only allow digits
    document.getElementById('room-input').addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/[^0-9]/g, '');
    });

    document.getElementById('btn-disconnect').addEventListener('click', disconnect);

    // Screenshot
    document.getElementById('btn-screenshot').addEventListener('click', () => {
      const video = document.getElementById('remote-video');
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0);

      // Flash effect
      const flash = document.createElement('div');
      flash.className = 'screenshot-flash';
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 300);

      // Download
      const link = document.createElement('a');
      link.download = `phonecam_${new Date().toISOString().replace(/[:.]/g, '-')}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();

      showToast('📸 Captura guardada');
    });

    // Fullscreen
    document.getElementById('btn-fullscreen').addEventListener('click', () => {
      const wrapper = document.getElementById('video-wrapper');
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        wrapper.requestFullscreen().catch(err => {
          // Fallback: manual fullscreen via CSS
          wrapper.classList.toggle('fullscreen');
        });
      }
    });

    // ESC to exit manual fullscreen
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        const wrapper = document.getElementById('video-wrapper');
        wrapper.classList.remove('fullscreen');
      }
    });
  </script>
</body>
</html>
