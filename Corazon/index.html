<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para ti ❤️ con IA</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Librerías de Inteligencia Artificial (MediaPipe) para visión por computadora en el navegador -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <!-- El corazón animado principal -->
        <div class="heart" id="heart"></div>
        
        <!-- Mensaje principal que se ve siempre -->
        <h1 class="message" id="main-message">Te extraño amor</h1>
        
        <!-- Carta de amor secreta, aparece con la interacción física -->
        <div class="secret-card" id="secret-card">
            <h2>Mi corazón se abre para ti</h2>
            <p>Esa palma abierta me dice que me acercas a tu corazón.<br>Siempre estaré para ti 💕</p>
        </div>
        
        <!-- Texto de alerta para el estado de la cámara -->
        <p class="status-indicator" id="status-indicator">Iniciando IA mágica... (Por favor, permite el acceso a la cámara)</p>
    </div>
    
    <!-- Contenedor de video nativo para leer la cámara (invisible) -->
    <video class="input_video" id="input-video" style="display: none;" playsinline></video>

    <!-- Partículas mágicas que flotan de fondo -->
    <div id="particles"></div>

    <script src="script.js"></script>
</body>
</html>
